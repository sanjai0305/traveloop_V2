name: Firebase CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Firebase Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install Functions Dependencies
        run: |
          cd functions
          npm install

      - name: Firebase Deploy
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Authenticating via Google Cloud Service Account..."
            printf "%s" "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
            export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json
            
            npx --package firebase-tools firebase deploy --only functions --non-interactive || (rm -f service-account.json && exit 1)
            rm -f service-account.json
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "Authenticating via legacy Firebase Token..."
            npx --package firebase-tools firebase deploy \
              --only functions \
              --token "$FIREBASE_TOKEN" \
              --non-interactive
          else
            echo "ERROR: Firebase secrets missing"
            exit 1
          fi
        shell: bash
