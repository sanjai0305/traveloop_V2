name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies (local check)
        working-directory: Backend
        run: |
          echo "Installing dependencies inside Backend/ locally to verify builds..."
          npm install

  deploy:
    name: Deploy to EC2
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Verify SSH Key Secret Presence (No-Leak Debug)
        run: |
          echo "=== SSH Key Diagnostic Check ==="
          if [ -z "${{ secrets.EC2_SSH_KEY_B64 }}" ]; then
            echo "ERROR: EC2_SSH_KEY_B64 is empty or not set in GitHub Secrets!"
            exit 1
          fi
          
          # Count characters in the Base64 secret
          CHAR_COUNT=$(echo -n "${{ secrets.EC2_SSH_KEY_B64 }}" | wc -m)
          echo "Base64 Secret length (characters): $CHAR_COUNT"
          
          # Check for unexpected whitespaces
          if [[ "${{ secrets.EC2_SSH_KEY_B64 }}" =~ [[:space:]] ]]; then
            echo "WARNING: Secret contains whitespace/spaces. It might be corrupted."
          else
            echo "✓ Secret is a continuous string (no whitespaces)"
          fi
          echo "=== Diagnostic Check Completed ==="

      - name: Decode SSH Private Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > private_key.pem
          chmod 600 private_key.pem
          
          # Verify decoded key content structure safely
          echo "=== Decoded Key Verification ==="
          if grep -q "BEGIN" private_key.pem; then
            echo "✓ Decoded key contains BEGIN header"
          else
            echo "✗ ERROR: Decoded key does NOT contain BEGIN header. Base64 string may be malformed."
            exit 1
          fi
          
          if grep -q "END" private_key.pem; then
            echo "✓ Decoded key contains END footer"
          else
            echo "✗ ERROR: Decoded key does NOT contain END footer. Base64 string may be malformed."
            exit 1
          fi
          echo "=== Decoded Key Verification Completed ==="

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: private_key.pem
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e

            echo "=== Starting Backend Deployment ==="

            # 7. Navigate to deployment directory
            echo "Navigating to /home/ubuntu/traveloop_V2..."
            cd /home/ubuntu/traveloop_V2

            # 8. Pull latest code from GitHub
            echo "Pulling latest changes from main branch..."
            git pull origin main

            # 9. Navigate to Backend/
            echo "Navigating to Backend..."
            cd Backend

            # 10. Run npm install
            echo "Running npm install (production)..."
            npm install --production

            # 11 & 12. PM2 process management
            # Check if PM2 is installed on the server first
            if ! command -v pm2 &> /dev/null; then
              echo "Error: PM2 is not installed on the server. Please install it with 'npm install -g pm2'."
              exit 1
            fi

            # Check if process exists and start/restart accordingly
            if pm2 describe traveloop-v2 > /dev/null 2>&1; then
              echo "Process 'traveloop-v2' exists. Restarting..."
              pm2 restart traveloop-v2
            else
              echo "Process 'traveloop-v2' does not exist. Starting..."
              pm2 start server.js --name traveloop-v2
            fi

            # 13. Run: pm2 save
            echo "Saving PM2 process list..."
            pm2 save

            # 14. Verify deployment status
            echo "Verifying deployment status..."
            sleep 3 # Give it a few seconds to boot up completely
            
            # Verify if status is online using grep (no jq dependency required)
            if pm2 list | grep "traveloop-v2" | grep -q "online"; then
              echo "Verification successful: Process 'traveloop-v2' is online."
            else
              echo "Error: Process 'traveloop-v2' is not online!"
              pm2 list
              exit 1
            fi

            # 15. Print deployment logs
            echo "=== Printing latest 50 lines of logs ==="
            tail -n 50 ~/.pm2/logs/traveloop-v2-out.log || echo "No output log file found."
            tail -n 50 ~/.pm2/logs/traveloop-v2-error.log || echo "No error log file found."

            echo "=== Deployment Finished Successfully ==="

      - name: Clean up temporary private key
        if: always()
        run: |
          echo "Cleaning up temporary private key file..."
          rm -f private_key.pem