name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_NEW }}
          script: |
            cd /home/ubuntu/Trip-Planner-Hackathon
            git pull origin main

            cd Backend
            npm install

            pm2 restart traveloop-backend