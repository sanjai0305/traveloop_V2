# .github/workflows/ota.yml
#
# Traveloop OTA Automation — Level 3
# ═══════════════════════════════════════════════════════════════════════════════
#
# Trigger : git push → main  (when traveloop/ changes)
# Source  : package.json "version" field  (NO .env dependency)
# Output  : GitHub Release (tag vX.Y.Z) with web.zip + version.json
#
# Developer workflow — ONLY three steps required:
#   1. Make UI changes
#   2. Bump "version" in  traveloop/package.json  (e.g. "1.1.0")
#   3. git add . && git commit -m "OTA v1.1.0" && git push
#   → Everything else is automated.
#
# ═══════════════════════════════════════════════════════════════════════════════

name: OTA Release

on:
  push:
    branches:
      - main
    # Only run when frontend files change — avoids wasting CI minutes on Backend-only commits
    paths:
      - 'traveloop/**'
      - '.github/workflows/ota.yml'

# Required to create/update GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  ota-release:
    name: Build → Package → Release
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: traveloop

    steps:
      # ── Step 1: Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so git log commit messages are available

      # ── Step 2: Setup Node.js ─────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: traveloop/package-lock.json

      # ── Step 3: Read version from package.json ────────────────────────────
      # package.json is tracked by git and always available in the runner.
      # This is the single source of truth — no .env needed.
      - name: Read version from package.json
        id: version
        run: |
          echo "[OTA] Reading version from package.json…"

          VERSION=$(node -p "require('./package.json').version")

          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::Could not read version from traveloop/package.json"
            exit 1
          fi

          echo "[OTA] Version: $VERSION"

          # Make available to all subsequent steps
          echo "VERSION=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "TAG=v$VERSION"      >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION"   >> "$GITHUB_ENV"

      # ── Step 4: Check for duplicate release ───────────────────────────────
      # Informational only — softprops/action-gh-release handles overwrites.
      - name: Check existing release
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          echo "[OTA] Checking if release $TAG already exists…"
          if git tag --list | grep -q "^${TAG}$"; then
            echo "[OTA] Release $TAG exists — assets will be overwritten."
          else
            echo "[OTA] No existing release found — a new one will be created."
          fi

      # ── Step 5: Install dependencies ─────────────────────────────────────
      # --legacy-peer-deps is required because @codetrix-studio/capacitor-google-auth
      # declares a peer dep on @capacitor/core ^6 but the project uses v8.x.
      - name: Install npm dependencies
        run: |
          echo "[OTA] Installing dependencies…"
          npm install --legacy-peer-deps
          echo "[OTA] Dependencies installed."

      # ── Step 6: Build React app ───────────────────────────────────────────
      # Vite reads .env.production (committed to git) for VITE_* variables.
      # VITE_APP_VERSION in .env.production should match package.json version.
      - name: Build application
        run: |
          echo "[OTA] Building Traveloop ${{ steps.version.outputs.VERSION }}…"
          npm run build
          echo "[OTA] Build complete — dist/ ready."

      # ── Step 7: Package dist/ → web.zip ──────────────────────────────────
      # All files inside dist/ are zipped at root level so Capgo can unpack
      # them directly into the WebView assets directory without an extra folder.
      - name: Package OTA bundle
        run: |
          echo "[OTA] Packaging dist/ → web.zip…"
          cd dist
          zip -r ../web.zip . --quiet
          cd ..
          SIZE=$(du -sh web.zip | cut -f1)
          echo "[OTA] web.zip created (${SIZE})"

      # ── Step 8: Generate version.json ─────────────────────────────────────
      # This is the manifest that OTAService.getLatestVersion() fetches.
      # releaseNotes are pulled from the latest git commit message automatically.
      - name: Generate version.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ steps.version.outputs.TAG }}"

          echo "[OTA] Generating version.json for $VERSION…"

          # Use the git commit message as release notes (no manual editing needed)
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" HEAD)

          cat > version.json << EOF
          {
            "version": "$VERSION",
            "url": "https://github.com/sanjai0305/traveloop_V2/releases/download/${TAG}/web.zip",
            "mandatory": false,
            "releaseNotes": "$COMMIT_MSG"
          }
          EOF

          # Validate JSON is well-formed before upload
          python3 -c "
          import json, sys
          try:
              json.load(open('version.json'))
              print('[OTA] version.json is valid JSON ✓')
          except json.JSONDecodeError as e:
              print(f'[OTA] Invalid JSON: {e}', file=sys.stderr)
              sys.exit(1)
          "

          echo "[OTA] version.json contents:"
          cat version.json

      # ── Step 9: Create / update GitHub Release + upload assets ───────────
      # softprops/action-gh-release@v2:
      #   - Creates the release if the tag doesn't exist yet
      #   - Overwrites existing assets if the tag already exists (re-run safe)
      - name: Create GitHub Release and upload OTA assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Traveloop ${{ steps.version.outputs.TAG }}"
          body: |
            ## Traveloop OTA Update — ${{ steps.version.outputs.TAG }}

            This release was created automatically by the GitHub Actions OTA workflow.

            > Users with the Traveloop app installed will see an update prompt on next launch.

            ### Assets
            | File | Description |
            |---|---|
            | `web.zip` | React UI bundle for OTA delivery via Capgo |
            | `version.json` | Update manifest fetched by the app at startup |

            ---
            *Commit: ${{ github.sha }} · Branch: ${{ github.ref_name }}*
          files: |
            traveloop/web.zip
            traveloop/version.json
          make_latest: true
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 10: Summary ──────────────────────────────────────────────────
      - name: Print OTA release summary
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ steps.version.outputs.TAG }}"
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║               [OTA] Release Published ✓                     ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "  Version  : $VERSION"
          echo "  Tag      : $TAG"
          echo "  Release  : https://github.com/sanjai0305/traveloop_V2/releases/tag/$TAG"
          echo "  web.zip  : https://github.com/sanjai0305/traveloop_V2/releases/download/$TAG/web.zip"
          echo "  manifest : https://github.com/sanjai0305/traveloop_V2/releases/latest/download/version.json"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "[OTA] Users who open Traveloop will now be prompted to update."
